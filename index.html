<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compleanno Giulio & Victoria 🦕🦄</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: 0;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .bg-gradient {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 10% 15%, rgba(255, 200, 230, 0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 90% 10%, rgba(180, 230, 255, 0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 80% 90%, rgba(200, 255, 210, 0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 20% 85%, rgba(255, 240, 160, 0.5) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(240, 210, 255, 0.3) 0%, transparent 60%),
      #fff8f0;
    z-index: 0;
  }

  .rainbow-arc {
    position: fixed;
    pointer-events: none;
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 10;
    width: min(520px, 95vw);
    background: rgba(255,255,255,0.82);
    border: 2px solid rgba(255,255,255,0.9);
    border-radius: 32px;
    padding: 2.5rem 2rem 2rem;
    backdrop-filter: blur(20px);
    text-align: center;
    animation: cardIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow:
      0 8px 40px rgba(200, 140, 255, 0.18),
      0 2px 12px rgba(255, 180, 220, 0.15);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .creatures-row {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 1.2rem;
    margin-bottom: 0.7rem;
  }
  .creature-dino {
    animation: float 3.2s ease-in-out infinite;
  }
  .creature-unicorn {
    animation: float 3.2s ease-in-out infinite;
    animation-delay: 0.5s;
  }
  .creature-star {
    animation: spinStar 4s linear infinite;
    margin-bottom: 1rem;
  }
  @keyframes spinStar {
    0%   { transform: rotate(0deg) scale(1); }
    50%  { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  .twins-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ff6eb4, #a78bfa);
    color: white;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 1rem;
    animation: pulse-badge 2s ease-in-out infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(167, 139, 250, 0.4); }
    50%       { box-shadow: 0 0 0 8px rgba(167, 139, 250, 0); }
  }

  .tagline {
    font-size: 1rem;
    color: #7c6f8a;
    font-style: italic;
    margin-bottom: 0.6rem;
    line-height: 1.5;
    animation: fadeIn 1s 0.3s both;
  }

  .names {
    font-family: 'Fredoka One', cursive;
    font-size: 3.2rem;
    line-height: 1;
    margin-bottom: 0.3rem;
    animation: fadeIn 1s 0.5s both;
  }

  .name-giulio { color: #3b82f6; }
  .name-amp    { color: #c4b5d0; font-size: 2rem; vertical-align: middle; }
  .name-vic    { color: #ec4899; }

  .age-badge {
    display: inline-block;
    margin-bottom: 1.2rem;
    animation: fadeIn 1s 0.7s both;
  }

  .age-number {
    font-family: 'Fredoka One', cursive;
    font-size: 4.5rem;
    background: linear-gradient(135deg, #fde68a, #fb923c, #f472b6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .age-label {
    font-size: 0.85rem;
    color: #a395b5;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-top: -0.3rem;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #a78bfa, #f472b6, #7dd3fc);
    border-radius: 2px;
    margin: 0.8rem auto 1.2rem;
    animation: fadeIn 1s 0.9s both;
  }

  .details {
    animation: fadeIn 1s 1s both;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
  }

  .detail-item {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    color: #4a3f5c;
    font-size: 0.95rem;
  }

  .detail-icon {
    font-size: 1.3rem;
    width: 2rem;
    text-align: center;
  }

  .detail-text strong {
    color: #2d2240;
    font-weight: 800;
  }

  .detail-text {
    text-align: left;
  }

  .cta {
    margin-top: 1.5rem;
    animation: fadeIn 1s 1.2s both;
  }

  .cta-button {
    display: inline-block;
    background: linear-gradient(135deg, #a78bfa, #f472b6, #fb923c);
    background-size: 200% auto;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 0.75rem 2rem;
    border-radius: 50px;
    border: none;
    cursor: default;
    animation: shimmer 3s linear infinite;
    letter-spacing: 0.5px;
  }

  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .floating-shapes {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .shape {
    position: absolute;
    font-size: 1.5rem;
    opacity: 0.55;
    animation: floatShape var(--dur, 8s) ease-in-out infinite;
    animation-delay: var(--del, 0s);
  }

  @keyframes floatShape {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.12; }
    50%       { transform: translateY(-30px) rotate(20deg); opacity: 0.25; }
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .confetto {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    top: -10px;
    animation: fall var(--fallDur, 4s) linear var(--fallDel, 0s) infinite;
    opacity: 0.8;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>

<script>
  const starsEl = document.getElementById('stars');
  const sparkleColors = ['#ff6b9d','#ffa94d','#ffe066','#69db7c','#74c0fc','#cc5de8','#f783ac','#a9e34b'];
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 5 + 3;
    const col = sparkleColors[Math.floor(Math.random()*sparkleColors.length)];
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top:  ${Math.random()*100}%;
      width: ${size}px;
      height: ${size}px;
      background: ${col};
      --d: ${2 + Math.random()*4}s;
      animation-delay: ${Math.random()*5}s;
      border-radius: ${Math.random()>0.5?'50%':'3px'};
    `;
    starsEl.appendChild(s);
  }

  const shapesEl = document.getElementById('shapes');
  const emojis = ['🦕','🦄','🌈','🌈','🦖','🦄','🌈','🦕','🎠','🌸','🍭','🌈','🦄','🦕','✨','🌈'];
  for (let i = 0; i < 22; i++) {
    const sh = document.createElement('div');
    sh.className = 'shape';
    sh.textContent = emojis[i % emojis.length];
    sh.style.cssText = `
      left: ${Math.random()*100}%;
      top:  ${Math.random()*100}%;
      --dur: ${5 + Math.random()*6}s;
      --del:  ${Math.random()*4}s;
      font-size: ${1.2 + Math.random()*2.2}rem;
    `;
    shapesEl.appendChild(sh);
  }

  const confettiEl = document.getElementById('confetti');
  const colors = ['#a78bfa','#f472b6','#7dd3fc','#fde68a','#86efac','#fb923c','#f9a8d4'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      --fallDur: ${3 + Math.random()*4}s;
      --fallDel: ${Math.random()*6}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    confettiEl.appendChild(c);
  }
</script>
